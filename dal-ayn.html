<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Protected · Ahmad Majid</title>
<link rel="icon" type="image/png" href="Images/favicon.png">
<style>
  @view-transition { navigation: auto; }
  ::view-transition-old(root), ::view-transition-new(root) {
    animation-duration: .55s;
    animation-timing-function: cubic-bezier(.2,.8,.2,1);
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700;6..72,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg:       #EFE6D6;
    --hero-bg:  #F6EFE0;
    --ink:      #163A2E;
    --pill-dark:#15140F;
    --line:     rgba(20,40,30,.12);
    --accent:   #4C7CDA;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── Password gate ─── */
  .pw-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .pw-card {
    background: var(--hero-bg);
    border-radius: 28px;
    padding: 52px 44px 44px;
    max-width: 420px; width: 100%;
    border: 1px solid rgba(20,40,30,.08);
    box-shadow: 0 40px 80px -32px rgba(20,40,30,.22), 0 1px 0 rgba(255,255,255,.7) inset;
    text-align: center;
    transition: transform .35s cubic-bezier(.4,1.6,.4,1);
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
  .pw-card.is-shaking { animation: shake .38s ease; }
  .pw-icon {
    width: 60px; height: 60px;
    background: var(--bg);
    border-radius: 18px;
    display: grid; place-items: center;
    margin: 0 auto 24px;
    border: 1px solid rgba(20,40,30,.08);
    transition: transform .5s cubic-bezier(.4,1.6,.4,1);
  }
  .pw-icon.is-open { transform: rotate(-18deg) scale(1.1); }
  .pw-title {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 700; font-size: 26px;
    letter-spacing: -0.025em; margin: 0 0 10px;
    color: var(--ink);
  }
  .pw-desc {
    font-size: 14px; font-weight: 500; line-height: 1.6;
    color: var(--ink); opacity: .55; margin: 0 0 28px;
  }
  .pw-input {
    display: block; width: 100%;
    padding: 13px 16px;
    background: var(--bg);
    border: 1.5px solid rgba(20,40,30,.14);
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 15px; font-weight: 500; color: var(--ink);
    outline: none; text-align: center;
    letter-spacing: .08em;
    transition: border-color .18s, box-shadow .18s;
    -webkit-appearance: none; appearance: none;
  }
  .pw-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(76,124,218,.12); }
  .pw-input.is-error { border-color: #D94F4F; box-shadow: 0 0 0 3px rgba(217,79,79,.10); }
  .pw-error {
    font-size: 12px; font-weight: 600; color: #D94F4F;
    margin: 8px 0 0; letter-spacing: .01em;
    opacity: 0; transition: opacity .2s ease;
  }
  .pw-error.is-visible { opacity: 1; }
  .pw-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--pill-dark); color: #F4ECDC;
    border: 0; cursor: pointer;
    padding: 13px 28px; border-radius: 999px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    letter-spacing: -0.005em; margin-top: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,.22);
    transition: transform .2s ease, box-shadow .2s ease;
    width: 100%; justify-content: center;
  }
  .pw-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,.26); }
  .pw-divider {
    font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink); opacity: .3; margin: 20px 0 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .pw-contact {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--ink);
    text-decoration: none; opacity: .55;
    transition: opacity .2s ease;
  }
  .pw-contact:hover { opacity: 1; }
  .pw-back {
    display: block; margin-top: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .04em;
    color: var(--ink); opacity: .38;
    text-decoration: none;
    transition: opacity .2s ease;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .pw-back:hover { opacity: .7; }

  /* ─── Case study ─── */
  .cs-hero {
    max-width: 1320px; margin: 0 auto;
    padding: clamp(40px, 6vw, 72px) clamp(20px, 4vw, 56px) 0;
  }
  .cs-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink); opacity: .55;
  }
  .cs-eyebrow__dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }
  .cs-title {
    margin: 24px 0 0;
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 800; letter-spacing: -0.035em; line-height: 0.96;
    font-size: clamp(48px, 7.4vw, 108px); color: var(--ink); max-width: 18ch;
  }
  .cs-title em { font-style: italic; font-weight: 500; opacity: .72; }
  .cs-deck {
    margin: 28px 0 0; max-width: 680px;
    font-size: clamp(16px, 1.35vw, 20px); line-height: 1.55;
    font-weight: 500; color: var(--ink); opacity: .78;
  }
  .cs-meta {
    margin: 48px 0 0; display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px;
  }
  .cs-meta__cell {
    display: flex; flex-direction: column; gap: 8px;
    border-radius: 18px; padding: 20px 20px 22px;
    transition: transform .2s ease;
  }
  .cs-meta__cell:hover { transform: translateY(-3px) rotate(.4deg); }
  .cs-meta__cell:nth-child(1) { background: rgba(76,124,218,.14); }
  .cs-meta__cell:nth-child(2) { background: rgba(184,219,236,.32); }
  .cs-meta__cell:nth-child(3) { background: rgba(199,194,240,.30); }
  .cs-meta__cell:nth-child(4) { background: rgba(248,228,90,.22); }
  .cs-meta__label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: .09em; text-transform: uppercase;
    color: var(--ink); opacity: .42; font-weight: 600;
  }
  .cs-meta__val { font-size: 13.5px; font-weight: 600; color: var(--ink); line-height: 1.45; }
  .cs-cover { margin: 48px auto 0; max-width: 1320px; padding: 0 clamp(20px, 4vw, 56px); }
  .cs-cover__frame {
    border-radius: 28px; overflow: hidden; aspect-ratio: 16/9; background: #1A1612;
    box-shadow: 0 30px 60px -30px rgba(20,40,30,.3);
  }
  .cs-cover__frame img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .cs-body { max-width: 760px; margin: 80px auto 0; padding: 0 clamp(20px, 4vw, 56px); }
  .cs-h2 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 700;
    font-size: clamp(26px, 2.8vw, 36px); letter-spacing: -0.025em;
    margin: 72px 0 18px; color: var(--ink); line-height: 1.1;
  }
  .cs-h2:first-child { margin-top: 0; }
  .cs-h3 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 700;
    font-size: clamp(20px, 2vw, 26px); letter-spacing: -0.02em;
    margin: 44px 0 14px; color: var(--ink);
  }
  .cs-body p {
    margin: 0 0 20px; font-size: 17px; line-height: 1.68;
    font-weight: 500; color: var(--ink); opacity: .82;
  }
  .cs-body p strong { font-weight: 700; color: var(--ink); opacity: 1; }
  .cs-pull {
    margin: 44px 0; padding: 28px 0;
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500; font-style: italic;
    font-size: clamp(20px, 2vw, 26px); line-height: 1.38;
    letter-spacing: -0.02em; color: var(--ink);
  }
  .cs-stats {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px; margin: 36px 0;
  }
  .cs-stat {
    background: var(--hero-bg); border-radius: 18px; padding: 22px 22px 24px;
    border: 1px solid rgba(20,40,30,.06); box-shadow: 0 1px 0 rgba(255,255,255,.6) inset;
  }
  .cs-stat__num {
    font-family: 'Newsreader', Georgia, serif; font-weight: 700;
    font-size: clamp(30px, 3.2vw, 44px); line-height: 1; letter-spacing: -0.02em; color: var(--ink);
  }
  .cs-stat__num em { font-style: italic; font-weight: 500; opacity: .7; color: var(--accent); }
  .cs-stat__label { margin-top: 10px; font-size: 13px; font-weight: 500; color: var(--ink); opacity: .6; line-height: 1.4; }
  .cs-wide { max-width: 1320px; margin: 56px auto; padding: 0 clamp(20px, 4vw, 56px); }
  .cs-wide__frame {
    border-radius: 22px; overflow: hidden; background: #1A1612;
    box-shadow: 0 18px 44px -22px rgba(20,40,30,.26);
  }
  .cs-wide__frame img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .cs-wide__frame--tall { aspect-ratio: 16/7; }
  .cs-wide__frame--medium { aspect-ratio: 16/8; }
  .cs-caption {
    text-align: center; margin-top: 12px;
    font-size: 13px; font-weight: 500; font-style: italic;
    color: var(--ink); opacity: .42;
    max-width: 760px; margin-left: auto; margin-right: auto;
  }
  .cs-steps { margin: 32px 0; }
  .cs-step { padding: 28px 0; border-top: 1px solid var(--line); }
  .cs-step:last-child { border-bottom: 1px solid var(--line); }
  .cs-step__tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .09em; text-transform: uppercase;
    color: var(--ink); opacity: .45; margin-bottom: 10px;
  }
  .cs-step__tag-num {
    width: 20px; height: 20px; border-radius: 6px; background: var(--accent);
    display: grid; place-items: center; font-size: 10px; font-weight: 700; color: #fff; opacity: 1;
  }
  .cs-step h3 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 700;
    font-size: clamp(20px, 2.2vw, 26px); letter-spacing: -0.02em; margin: 0 0 12px; color: var(--ink);
  }
  .cs-step p { font-size: 16px; line-height: 1.65; font-weight: 500; color: var(--ink); opacity: .78; margin: 0; }
  .cs-findings { margin: 8px 0; display: flex; flex-direction: column; gap: 20px; }
  .cs-finding {
    border-radius: 22px; padding: 30px 30px 26px;
    position: relative; overflow: hidden;
  }
  .cs-finding--01 { background: rgba(76,124,218,.13); }
  .cs-finding--02 { background: rgba(184,219,236,.30); }
  .cs-finding--03 { background: rgba(199,194,240,.28); }
  .cs-finding__ghost {
    position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 800; font-size: 108px; line-height: 1; letter-spacing: -0.05em;
    color: var(--ink); opacity: .07; pointer-events: none; user-select: none;
  }
  .cs-finding__tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .09em; text-transform: uppercase;
    color: var(--ink); font-weight: 600; margin-bottom: 10px; opacity: .45;
  }
  .cs-finding__title {
    font-weight: 700; font-size: clamp(17px, 1.5vw, 20px); margin: 0 0 12px;
    color: var(--ink); letter-spacing: -0.02em;
  }
  .cs-finding p { font-size: 15px; line-height: 1.65; color: var(--ink); opacity: .75; font-weight: 500; margin: 0 0 14px; }
  .cs-finding p:last-child { margin-bottom: 0; }
  .cs-finding .cs-quote { background: rgba(20,40,30,.07); border-color: rgba(20,40,30,.25); }
  .cs-quote {
    margin: 24px 0 8px; padding: 16px 16px 16px 18px;
    background: rgba(76,124,218,.08); border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
  }
  .cs-quote__text {
    font-family: 'Newsreader', Georgia, serif; font-weight: 500; font-style: italic;
    font-size: clamp(15px, 1.3vw, 17px); line-height: 1.48; letter-spacing: -0.01em;
    color: var(--ink); margin: 0 0 8px;
  }
  .cs-quote__attr {
    font-size: 12px; font-weight: 600; color: var(--ink); opacity: .45;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .02em;
  }
  .cs-also { list-style: none; padding: 0; margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
  .cs-also li {
    display: flex; gap: 12px; align-items: start;
    font-size: 15px; line-height: 1.55; font-weight: 500; color: var(--ink); opacity: .78;
  }
  .cs-also li::before { content: "·"; font-size: 20px; line-height: 1; flex-shrink: 0; color: var(--accent); opacity: 1; margin-top: 1px; }
  .cs-bets { list-style: none; padding: 0; margin: 20px 0; display: flex; flex-direction: column; gap: 0; }
  .cs-bet {
    display: grid; grid-template-columns: 28px 1fr; gap: 14px; align-items: start;
    padding: 16px 0; border-top: 1px solid var(--line);
  }
  .cs-bet:last-child { border-bottom: 1px solid var(--line); }
  .cs-bet__num {
    width: 24px; height: 24px; border-radius: 7px; background: var(--accent); color: #fff;
    display: grid; place-items: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .cs-bet__label { font-weight: 700; font-size: 15px; margin: 0 0 3px; color: var(--ink); }
  .cs-bet__desc { font-size: 14px; opacity: .68; font-weight: 500; margin: 0; line-height: 1.5; }
  .cs-result { padding: 40px 0; border-top: 1px solid var(--line); }
  .cs-result:first-child { border-top: 0; padding-top: 0; }
  .cs-result__header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 20px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .cs-result h3 {
    font-family: 'Newsreader', Georgia, serif; font-weight: 700;
    font-size: clamp(20px, 2.2vw, 26px); letter-spacing: -0.02em; margin: 0; color: var(--ink);
  }
  .cs-result__stat {
    font-family: 'Newsreader', Georgia, serif; font-weight: 700;
    font-size: clamp(22px, 2.4vw, 30px); letter-spacing: -0.02em; color: var(--accent); white-space: nowrap;
  }
  .cs-result p { font-size: 16px; line-height: 1.65; font-weight: 500; color: var(--ink); opacity: .78; margin: 0; }
  .cs-reflections { list-style: none; padding: 0; margin: 8px 0; }
  .cs-reflection {
    display: grid; grid-template-columns: 72px 1fr; gap: 28px; align-items: start;
    padding: 36px 0; border-top: 1px solid var(--line);
  }
  .cs-reflection:last-child { border-bottom: 1px solid var(--line); }
  .cs-reflection__num {
    font-family: 'Newsreader', Georgia, serif; font-weight: 800;
    font-size: clamp(48px, 5vw, 68px); line-height: 1; letter-spacing: -0.04em;
    color: var(--accent); opacity: .2; margin-top: -6px; user-select: none;
  }
  .cs-reflection__title { font-weight: 700; font-size: clamp(15px, 1.35vw, 18px); margin: 0 0 8px; color: var(--ink); letter-spacing: -0.01em; }
  .cs-reflection__text { font-size: 15px; opacity: .72; margin: 0; font-weight: 500; line-height: 1.6; }
  .cs-next { max-width: 1320px; margin: 100px auto 0; padding: 0 clamp(20px, 4vw, 56px) 80px; }
  .cs-next__inner {
    background: var(--hero-bg); border-radius: 28px; padding: 48px clamp(28px, 4vw, 56px);
    display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;
    border: 1px solid rgba(20,40,30,.05); box-shadow: 0 1px 0 rgba(255,255,255,.6) inset;
  }
  .cs-next__eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .09em;
    text-transform: uppercase; color: var(--ink); opacity: .45; margin-bottom: 10px;
  }
  .cs-next__title {
    margin: 0; font-family: 'Newsreader', Georgia, serif; font-weight: 700;
    font-size: clamp(26px, 3vw, 38px); letter-spacing: -0.025em; color: var(--ink);
  }
  .cs-next__cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--pill-dark); color: #F4ECDC; text-decoration: none;
    padding: 14px 22px; border-radius: 6px; font-size: 14px; font-weight: 600;
    letter-spacing: -0.005em; box-shadow: 0 6px 18px rgba(0,0,0,.2);
    transition: transform .2s ease, box-shadow .2s ease; white-space: nowrap;
  }
  .cs-next__cta:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,.24); }
  @media (max-width: 800px) {
    .cs-meta { grid-template-columns: repeat(2, 1fr); }
    .cs-stats { grid-template-columns: 1fr; gap: 10px; }
    .cs-result__header { flex-direction: column; gap: 4px; }
  }
  .cs-fade { animation: csFade .7s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes csFade { from { opacity: 0; transform: translateY(8px); } }
</style>
</head>
<body>

<div id="snav-root"></div>
<div id="main"></div>

<script type="text/babel" src="navbar.jsx"></script>
<script type="text/babel">
/* global React, ReactDOM, Nav */
const _dHrefs = { "Home": "index.html", "Case Studies": "work.html", "About": "about.html" };
ReactDOM.createRoot(document.getElementById('snav-root')).render(
  <Nav active="Case Studies" onChange={function(it) { window.location.href = _dHrefs[it]; }} />
);
</script>

<script>
(function () {
  'use strict';

  var main = document.getElementById('main');

  function showGate() {
    document.title = 'Protected · Ahmad Majid';
    main.innerHTML = `
      <div class="pw-wrap">
        <div class="pw-card" id="pw-card">
          <div class="pw-icon" id="pw-icon">
            <svg width="28" height="30" viewBox="0 0 28 30" fill="none">
              <rect x="3" y="14" width="22" height="15" rx="3.5" fill="#15140F" opacity=".88"/>
              <path d="M9 14V10a5 5 0 0 1 10 0v4" stroke="#15140F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity=".88"/>
              <circle cx="14" cy="21.5" r="2.2" fill="rgba(255,255,255,.38)"/>
            </svg>
          </div>
          <h2 class="pw-title">Protected work</h2>
          <p class="pw-desc">This case study sits behind an NDA. Drop me a line and I'll share the password — usually same day.</p>
          <input type="password" class="pw-input" id="pw-input" placeholder="Enter password" autocomplete="off" spellcheck="false">
          <p class="pw-error" id="pw-error">Wrong password — try again</p>
          <button class="pw-btn" id="pw-btn">
            Unlock
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 7h7M7 4l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="pw-divider">or</div>
          <a href="contact.html" class="pw-contact">
            Contact me to get the password
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2.5 6h7M6.5 3l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <a href="work.html" class="pw-back">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M8 6H2M5 3l-3 3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back to case studies
          </a>
        </div>
      </div>`;

    var input = main.querySelector('#pw-input');
    var btn   = main.querySelector('#pw-btn');
    var error = main.querySelector('#pw-error');
    var card  = main.querySelector('#pw-card');
    var icon  = main.querySelector('#pw-icon');

    function markWrong() {
      input.classList.add('is-error');
      error.classList.add('is-visible');
      card.classList.remove('is-shaking');
      void card.offsetWidth;
      card.classList.add('is-shaking');
      input.select();
