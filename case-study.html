<style>
  @view-transition { navigation: auto; }
  ::view-transition-old(root),
  ::view-transition-new(root) {
    animation-duration: .55s;
    animation-timing-function: cubic-bezier(.2,.8,.2,1);
  }
  ::view-transition-group(*) {
    animation-duration: .7s;
    animation-timing-function: cubic-bezier(.2,.8,.2,1);
  }

  :root {
    --bg: #EFE6D6;
    --hero-bg: #F6EFE0;
    --ink: #163A2E;
    --pill-dark: #15140F;
    --line: rgba(20,40,30,.12);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Hero */
  .cs-hero {
    max-width: 1320px; margin: 0 auto;
    padding: clamp(40px, 6vw, 72px) clamp(20px, 4vw, 56px) 0;
  }
  .cs-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink); opacity: .55;
  }
  .cs-eyebrow__dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--accent, #F4D24A);
  }
  .cs-title {
    margin: 24px 0 0;
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 800;
    letter-spacing: -0.035em;
    line-height: 0.96;
    font-size: clamp(48px, 7.4vw, 112px);
    color: var(--ink);
    max-width: 16ch;
  }
  .cs-title em { font-style: italic; font-weight: 500; opacity: .75; }
  .cs-deck {
    margin: 32px 0 0;
    max-width: 720px;
    font-size: clamp(17px, 1.4vw, 21px);
    line-height: 1.5;
    font-weight: 500;
    color: var(--ink); opacity: .8;
  }

  .cs-meta {
    margin: 48px 0 0;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 28px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 24px 0;
  }
  .cs-meta__cell {
    display: flex; flex-direction: column; gap: 4px;
  }
  .cs-meta__label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink); opacity: .5;
  }
  .cs-meta__val {
    font-size: 15px; font-weight: 600;
    color: var(--ink);
  }

  /* Hero image */
  .cs-cover {
    margin: 48px auto 0;
    max-width: 1320px;
    padding: 0 clamp(20px, 4vw, 56px);
  }
  .cs-cover__frame {
    border-radius: 28px;
    overflow: hidden;
    aspect-ratio: 16/9;
    background: #1A1612;
    box-shadow: 0 30px 60px -30px rgba(20,40,30,.3);
  }
  .cs-cover__frame img {
    display: block; width: 100%; height: 100%;
    object-fit: cover;
  }

  /* Body */
  .cs-body {
    max-width: 760px; margin: 80px auto 0;
    padding: 0 clamp(20px, 4vw, 56px);
  }
  /* Reading progress bar */
  .read-progress {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 3px; pointer-events: none;
    background: rgba(20,40,30,.06);
  }
  .read-progress__fill {
    height: 100%; width: 0%;
    background: var(--accent, var(--ink));
    transition: width .1s linear;
  }

  /* Breadcrumb */
  .cs-breadcrumb {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink); opacity: .35; text-decoration: none;
    margin-bottom: 24px;
    transition: opacity .2s;
  }
  .cs-breadcrumb:hover { opacity: .7; }

  .cs-h2 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 700; font-size: clamp(28px, 3vw, 40px);
    letter-spacing: -0.025em; margin: 64px 0 18px; color: var(--ink);
    display: flex; align-items: center; gap: 14px;
  }
  .cs-h2:first-child { margin-top: 0; }
  .cs-h2::before {
    content: "";
    width: 22px; height: 3px; flex-shrink: 0;
    background: var(--accent, var(--ink));
    border-radius: 2px; margin-top: 3px;
  }
  .cs-body p {
    margin: 0 0 20px; font-size: 17px; line-height: 1.68;
    font-weight: 500; color: var(--ink); opacity: .82;
  }
  .cs-body p strong { font-weight: 700; opacity: 1; }

  .cs-pull {
    margin: 44px 0;
    padding: 2px 0 2px 22px;
    border-left: 3px solid var(--accent, var(--ink));
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 500; font-style: italic;
    font-size: clamp(22px, 2.2vw, 30px);
    line-height: 1.38; letter-spacing: -0.02em; color: var(--ink);
  }

  .cs-stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px; margin: 36px 0;
  }
  .cs-stat {
    background: var(--hero-bg); border-radius: 18px;
    padding: 22px 22px 24px;
    border: 1px solid rgba(20,40,30,.06);
    border-left: 3px solid var(--accent, var(--ink));
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .cs-stat:hover {
    transform: translateY(-3px);
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 10px 22px -8px rgba(20,40,30,.18);
  }
  .cs-stat__num {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 700; font-size: clamp(34px, 3.5vw, 48px);
    line-height: 1; letter-spacing: -0.02em;
    color: var(--accent, var(--ink));
  }
  .cs-stat__num em { font-style: italic; font-weight: 500; opacity: .75; }
  .cs-stat__label {
    margin-top: 10px; font-size: 13px; font-weight: 500;
    color: var(--ink); opacity: .65; line-height: 1.4;
  }

  /* Next case */
  .cs-next {
    max-width: 1320px; margin: 100px auto 0;
    padding: 0 clamp(20px, 4vw, 56px) 80px;
  }
  .cs-next__inner {
    background: var(--hero-bg); border-radius: 28px;
    padding: 48px clamp(28px, 4vw, 56px);
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    border: 1px solid rgba(0,0,0,.05);
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset;
    transition: box-shadow .3s ease, transform .3s ease;
  }
  .cs-next__inner:hover {
    transform: translateY(-3px);
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 18px 44px -20px rgba(20,40,30,.22);
  }
  .cs-next__label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink); opacity: .55;
  }
  .cs-next__title {
    margin: 8px 0 0;
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 700; font-size: clamp(28px, 3vw, 42px);
    letter-spacing: -0.025em; color: var(--ink);
  }
  .cs-next__cta {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--pill-dark); color: #F4ECDC;
    text-decoration: none; padding: 13px 22px; border-radius: 999px;
    font-size: 14px; font-weight: 700; letter-spacing: -0.005em;
    box-shadow: 0 4px 12px rgba(0,0,0,.18);
    transition: transform .2s ease, gap .2s ease, box-shadow .2s ease;
  }
  .cs-next__cta:hover { transform: translateY(-1px); gap: 13px; box-shadow: 0 8px 20px rgba(0,0,0,.24); }

  @media (max-width: 800px) {
    .cs-meta { grid-template-columns: repeat(2, 1fr); }
    .cs-stats { grid-template-columns: 1fr; }
  }

  /* ── Password gate (full page — no content behind it) ── */
  #main.is-gate {
    min-height: calc(100vh - 62px);
    display: flex; align-items: center; justify-content: center;
    padding: clamp(20px, 5vw, 48px);
  }

  .pw-card {
    background: var(--hero-bg);
    border-radius: 28px;
    border: 1px solid rgba(0,0,0,.06);
    box-shadow:
      0 1px 0 rgba(255,255,255,.65) inset,
      0 24px 56px -20px rgba(20,40,30,.22),
      0 4px 12px rgba(20,40,30,.08);
    padding: clamp(32px, 4vw, 52px) clamp(28px, 4vw, 48px);
    max-width: 400px; width: 100%;
    text-align: center;
    animation: cardIn .5s cubic-bezier(.2,.8,.2,1) both;
  }
  .pw-card.is-leaving {
    animation: cardOut .45s cubic-bezier(.2,.8,.2,1) forwards;
    pointer-events: none;
  }
  @keyframes cardOut {
    to { opacity: 0; transform: scale(.96) translateY(-10px); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(.96); }
  }
  .pw-card.is-shaking {
    animation: shake .42s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0); }
    15%     { transform: translateX(-9px) rotate(-.4deg); }
    30%     { transform: translateX(8px) rotate(.4deg); }
    45%     { transform: translateX(-7px) rotate(-.3deg); }
    60%     { transform: translateX(6px) rotate(.3deg); }
    78%     { transform: translateX(-3px); }
  }

  .pw-icon {
    width: 68px; height: 68px; border-radius: 20px;
    background: #F8E45A;
    display: grid; place-items: center;
    margin: 0 auto 26px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.55) inset,
      0 10px 24px rgba(248,228,90,.45);
    animation: breathe 3.2s ease-in-out infinite;
    transition: background .4s ease, box-shadow .4s ease;
  }
  .pw-icon.is-open {
    background: #6BD08A;
    box-shadow: 0 1px 0 rgba(255,255,255,.55) inset, 0 10px 24px rgba(107,208,138,.45);
    animation: popIn .35s cubic-bezier(.2,1.4,.4,1) both;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.05); }
  }
  @keyframes popIn {
    from { transform: scale(.7) rotate(-8deg); }
    to   { transform: scale(1) rotate(0); }
  }

  .pw-title {
    margin: 0 0 10px;
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 800; font-size: clamp(22px, 3vw, 30px);
    letter-spacing: -0.025em; color: var(--ink);
  }
  .pw-desc {
    margin: 0 auto 28px;
    max-width: 30ch;
    font-size: 15px; line-height: 1.6; font-weight: 500;
    color: var(--ink); opacity: .65;
  }

  .pw-input {
    display: block; width: 100%;
    padding: 13px 16px;
    background: rgba(22,58,46,.045);
    border: 1.5px solid rgba(20,40,30,.14);
    border-radius: 10px;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 16px; font-weight: 600;
    color: var(--ink); letter-spacing: .10em;
    text-align: center; outline: none;
    transition: border-color .18s, box-shadow .18s, background .18s;
    -webkit-appearance: none; appearance: none;
    margin-bottom: 8px;
  }
  .pw-input::placeholder { letter-spacing: 0; font-weight: 500; opacity: .35; }
  .pw-input:focus {
    border-color: rgba(22,58,46,.45);
    box-shadow: 0 0 0 3px rgba(22,58,46,.08);
  }
  .pw-input.is-error {
    border-color: #D95040;
    box-shadow: 0 0 0 3px rgba(217,80,64,.12);
    background: rgba(217,80,64,.04);
  }

  .pw-error {
    height: 18px; margin: 0 0 14px;
    font-size: 12px; font-weight: 600; letter-spacing: .01em;
    color: #D95040; opacity: 0;
    font-family: 'JetBrains Mono', monospace;
    transition: opacity .2s;
  }
  .pw-error.is-visible { opacity: 1; }

  .pw-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px 20px;
    background: var(--pill-dark); color: #F4ECDC;
    border: 0; border-radius: 10px; cursor: pointer;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
    box-shadow: 0 1px 0 rgba(255,255,255,.07) inset, 0 6px 20px rgba(0,0,0,.26);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .pw-btn:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,.07) inset, 0 10px 26px rgba(0,0,0,.3); }
  .pw-btn:active { transform: none; }

  .pw-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0; color: var(--ink); opacity: .2;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: .08em;
  }
  .pw-divider::before, .pw-divider::after {
    content: ""; flex: 1; height: 1px;
    background: rgba(20,40,30,.18);
  }

  .pw-contact {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    color: var(--ink); opacity: .5;
    text-decoration: none;
    border-bottom: 1px solid rgba(20,40,30,.18);
    padding-bottom: 1px;
    transition: opacity .2s;
  }
  .pw-contact:hover { opacity: .9; }

  .pw-back {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 18px;
    font-size: 12px; font-weight: 600;
    color: var(--ink); opacity: .3;
    text-decoration: none;
    letter-spacing: -0.005em;
    transition: opacity .2s;
  }
  .pw-back:hover { opacity: .65; }

  .cs-fade {
    animation: csFade .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes csFade {
    from { opacity: 0; transform: translateY(8px); }
  }
</style>
</head>

      if (sec.h) html += '<h2 class="cs-h2">' + sec.h + '</h2>';
      if (sec.p) html += '<p>' + sec.p + '</p>';
      if (sec.pull) html += '<div class="cs-pull">"' + sec.pull + '"</div>';
      if (sec.stats) {
        html += '<div class="cs-stats">';
        sec.stats.forEach(function (s) {
          html += '<div class="cs-stat"><div class="cs-stat__num">' + s.num + '</div><div class="cs-stat__label">' + s.label + '</div></div>';
        });
        html += '</div>';
      }
    });
    return html;
  }

  function showCase(slug) {
    var c = CASES[slug] || CASES['miro-ai'];
    var next = CASES[c.next];
    document.title = c.title + ' · Ahmad Majid';
    document.documentElement.style.setProperty('--accent', c.accent);
    var main = document.getElementById('main');
    main.className = 'cs-fade';
    main.innerHTML =
      '<section class="cs-hero">' +
        '<a href="work.html" class="cs-breadcrumb">' +
          '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L3 6l5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          'Case studies' +
        '</a>' +
        '<div class="cs-eyebrow"><span class="cs-eyebrow__dot"></span><span>Case study · ' + c.year + '</span></div>' +
        '<h1 class="cs-title">' + c.title + '</h1>' +
        '<p class="cs-deck">' + c.sub + '</p>' +
        '<div class="cs-meta">' +
          '<div class="cs-meta__cell"><div class="cs-meta__label">Company</div><div class="cs-meta__val">' + c.company + '</div></div>' +
          '<div class="cs-meta__cell"><div class="cs-meta__label">Role</div><div class="cs-meta__val">' + c.role + '</div></div>' +
          '<div class="cs-meta__cell"><div class="cs-meta__label">Duration</div><div class="cs-meta__val">' + c.duration + '</div></div>' +
          '<div class="cs-meta__cell"><div class="cs-meta__label">Team</div><div class="cs-meta__val">' + c.team + '</div></div>' +
        '</div>' +
      '</section>' +
      '<section class="cs-cover"><div class="cs-cover__frame"><img src="' + c.image + '" alt="' + c.title + '" style="view-transition-name: case-img-' + slug + ';"></div></section>' +
      '<article class="cs-body">' + buildBodyHtml(c) + '</article>' +
      '<section class="cs-next"><div class="cs-next__inner">' +
        '<div><div class="cs-next__label">Next case study · ' + next.year + '</div><h3 class="cs-next__title">' + next.title + '</h3></div>' +
        '<a class="cs-next__cta" href="case-study.html?slug=' + c.next + '">Continue <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h7M7 4l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>' +
      '</div></section>';
  }

  function showGate(slug) {
    document.title = 'Protected · Ahmad Majid';
    document.documentElement.style.setProperty('--accent', '#F4D24A');
    var main = document.getElementById('main');
    main.className = 'is-gate';
    main.innerHTML =
      '<div class="pw-card" id="pw-card">' +
        '<div class="pw-icon" id="pw-icon">' +
          '<svg width="28" height="30" viewBox="0 0 28 30" fill="none">' +
            '<rect x="3" y="14" width="22" height="15" rx="3.5" fill="#15140F" opacity=".88"/>' +
            '<path d="M9 14V10a5 5 0 0 1 10 0v4" stroke="#15140F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity=".88"/>' +
            '<circle cx="14" cy="21.5" r="2.2" fill="rgba(255,255,255,.38)"/>' +
          '</svg>' +
        '</div>' +
        '<h2 class="pw-title">Protected work</h2>' +
        '<p class="pw-desc">This case study is covered by an NDA. Contact me directly and I\'ll share the password.</p>' +
        '<input type="password" class="pw-input" id="pw-input" placeholder="Enter password" autocomplete="off" spellcheck="false">' +
        '<p class="pw-error" id="pw-error">Wrong password — try again</p>' +
        '<button class="pw-btn" id="pw-btn">Unlock <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h7M7 4l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
        '<div class="pw-divider">or</div>' +
        '<a href="contact.html" class="pw-contact">Contact me to get the password <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6h7M6.5 3l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>' +
        '<a href="work.html" class="pw-back"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 6H2M5 3l-3 3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to case studies</a>' +
      '</div>';

    var input = main.querySelector('#pw-input');
    var btn   = main.querySelector('#pw-btn');
    var error = main.querySelector('#pw-error');
    var card  = main.querySelector('#pw-card');
    var icon  = main.querySelector('#pw-icon');

    function markWrong() {
      input.classList.add('is-error');
      error.classList.add('is-visible');
      card.classList.remove('is-shaking');
      void card.offsetWidth;
      card.classList.add('is-shaking');
      input.select();
    }

    function unlock() {
      input.classList.remove('is-error');
      error.classList.remove('is-visible');
      icon.classList.add('is-open');
      icon.innerHTML =
        '<svg width="28" height="30" viewBox="0 0 28 30" fill="none">' +
          '<rect x="3" y="14" width="22" height="15" rx="3.5" fill="#15140F" opacity=".88"/>' +
          '<path d="M9 14V10a5 5 0 0 1 10 0V7" stroke="#15140F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity=".88"/>' +
          '<circle cx="14" cy="21.5" r="2.2" fill="rgba(255,255,255,.38)"/>' +
        '</svg>';
      card.classList.add('is-leaving');
      setTimeout(function () { showCase(slug); }, 480);
    }

    function attempt() {
      if (input.value === 'Miroxahmad2025') { unlock(); } else { markWrong(); }
    }

    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { attempt(); return; }
      input.classList.remove('is-error');
      error.classList.remove('is-visible');
    });
    setTimeout(function () { input.focus(); }, 400);
  }

  /* Add slugs here to gate additional case studies */
  var LOCKED = { 'miro-ai': true };

  var slug = getSlug();
  if (LOCKED[slug]) { showGate(slug); } else { showCase(slug); }

  /* Reading progress bar */
  var fill = document.getElementById('read-fill');
  if (fill) {
    window.addEventListener('scroll', function () {
      var h = document.body.scrollHeight - window.innerHeight;
      fill.style.width = (h > 0 ? Math.round(window.scrollY / h * 1000) / 10 : 0) + '%';
    }, { passive: true });
  }

}());
</script>
