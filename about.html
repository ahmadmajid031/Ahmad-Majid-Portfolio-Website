<style>
  @view-transition { navigation: auto; }
  ::view-transition-old(root),
  ::view-transition-new(root) { animation-duration: .55s; animation-timing-function: cubic-bezier(.2,.8,.2,1); }
  ::view-transition-group(*) { animation-duration: .65s; animation-timing-function: cubic-bezier(.2,.8,.2,1); }

  :root {
    --bg: #EFE6D6;
    --hero-bg: #F6EFE0;
    --ink: #163A2E;
    --pill-dark: #15140F;
    --line: rgba(20,40,30,.12);
    --peach: #F8C495;
    --lilac: #C7C2F0;
    --sky: #B8DBEC;
    --sun: #F8E45A;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* CTA */
  .ab-cta-row {
    max-width: 1320px; margin: 100px auto 0;
    padding: 0 clamp(20px, 4vw, 56px) 80px;
  }
  .ab-cta-card {
    background: var(--hero-bg);
    border-radius: 28px;
    padding: 48px clamp(28px, 4vw, 56px);
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
  }
  .ab-cta-card__label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink); opacity: .55;
  }
  .ab-cta-card__title {
    margin: 8px 0 0;
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 700;
    font-size: clamp(28px, 3vw, 42px);
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .ab-cta-card__cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--pill-dark); color: #F4ECDC;
    text-decoration: none;
    padding: 14px 22px;
    border-radius: 4px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; border: 0; font-family: inherit;
  }

  .ab-fade { animation: abFade .7s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes abFade { from { opacity: 0; transform: translateY(8px); } }
</style>
</head>

<div id="snav-root"></div>

<main class="ab-fade">
  <div id="about-section-root" style="padding: 0 clamp(20px, 4vw, 56px);"></div>

  <section class="ab-cta-row">
    <div class="ab-cta-card">
      <div>
        <div class="ab-cta-card__label">Let's talk</div>
        <h3 class="ab-cta-card__title">Got a problem worth designing?</h3>
      </div>
      <button class="ab-cta-card__cta"
        data-cal-link="ahmad-majid-7sgoyt/30min"
        data-cal-namespace="30min"
        data-cal-config='{"layout":"month_view","useSlotsViewOnSmallScreen":"true"}'>
        Say hello
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7h7M7 4l3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
    </div>
  </section>
</main>

<div id="afooter-root"></div>

ReactDOM.createRoot(document.getElementById('about-section-root')).render(<AboutSection />);
