/* ─── Helpers ─── */
function formatDate(iso) {
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
}

function useReveal() {
  const ref = useRR(null);
  const [on, setOn] = useRS(false);
  useRE(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setOn(true); io.disconnect(); }
    }, { threshold: 0, rootMargin: "0px 0px -60px 0px" });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return [ref, on];
}

/* ─── Card ─── */
function ReflectionCard({ item, batchIndex }) {
  const [wrapRef, inView] = useReveal();
  const [copied, setCopied] = useRS(false);

  const tagStyle = TAG_MAP[item.tag] || TAG_DEFAULT;
  const shareUrl = window.location.href.split("?")[0].split("#")[0] + "#" + item.id;

  function copyLink() {
    const url = shareUrl;
    const apply = () => { setCopied(true); setTimeout(() => setCopied(false), 2400); };
    const fallback = () => {
      const el = document.createElement('textarea');
      el.value = url;
      el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
      document.body.appendChild(el);
      el.select();
      try { document.execCommand('copy'); apply(); } catch(e) {}
      document.body.removeChild(el);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(apply).catch(fallback);
    } else {
      fallback();
    }
  }

  const tweetHref = "https://x.com/intent/tweet?text=" + encodeURIComponent('"' + item.title + '"') + "&url=" + encodeURIComponent(shareUrl);
  const liHref    = "https://www.linkedin.com/sharing/share-offsite/?url=" + encodeURIComponent(shareUrl);

  return (
    <div
      ref={wrapRef}
      className={"rcard-wrap" + (inView ? " is-in" : "")}
      style={{ transitionDelay: inView ? (batchIndex * 70) + "ms" : "0ms" }}
    >
      <article id={item.id} className="rcard">

        {/* Header: tag sticker + date */}
        <div className="rcard__header">
          <span
            className="rcard__tag"
            style={{
              background: tagStyle.bg,
              transform: "rotate(" + tagStyle.rot + ")",
            }}
          >
            {item.tag}
          </span>
          <time className="rcard__date" dateTime={item.date}>{formatDate(item.date)}</time>
        </div>

        {/* Body: title + content */}
        <div className="rcard__body">
          <h2 className="rcard__title">{item.title}</h2>
          <div className="rcard__content">
            {item.paragraphs.map((p, i) => {
              if (p.type === "quote") {
                return (
                  <blockquote key={i}>
                    <p>{p.text}</p>
                  </blockquote>
                );
              }
              if (p.type === "rich") {
                return (
                  <p key={i}>
                    {p.segments.map((seg, j) =>
                      typeof seg === "string"
                        ? seg
                        : <a key={j} href={seg.href} target="_blank" rel="noopener noreferrer">{seg.text}</a>
                    )}
                  </p>
                );
              }
              return <p key={i}>{p.text}</p>;
            })}
          </div>
        </div>

        {/* Share */}
        <div className="rcard__share">
          <a href={tweetHref} target="_blank" rel="noopener noreferrer" className="rcard__share-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.732-8.885L1.254 2.25H8.08l4.252 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
            </svg>
            Post on X
          </a>

          <a href={liHref} target="_blank" rel="noopener noreferrer" className="rcard__share-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            Share on LinkedIn
          </a>

          <button
            onClick={copyLink}
            className={"rcard__share-btn" + (copied ? " rcard__share-btn--copied" : "")}
          >
            {copied ? (
              <>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                  <path d="M20 6L9 17l-5-5"/>
                </svg>
                Copied!
              </>
            ) : (
              <>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy link
              </>
            )}
          </button>
        </div>

      </article>
    </div>
  );
}

/* ─── Filter bar ─── */
function FilterBar({ allTags, activeTag, setActiveTag, search, setSearch, sortOrder, setSortOrder }) {
  return (
    <div className="rfilter">
      <div className="rfilter__top">

        {/* Search */}
        <div className="rfilter__search-wrap">
          <svg className="rfilter__search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            className="rfilter__search"
            placeholder="Search reflections..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            aria-label="Search reflections"
          />
          {search && (
            <button className="rfilter__clear" onClick={() => setSearch('')} aria-label="Clear search">×</button>
          )}
        </div>

        {/* Sort */}
        <button
          className="rfilter__sort"
          onClick={() => setSortOrder(s => s === 'desc' ? 'asc' : 'desc')}
        >
          <span className={"rfilter__sort-icon" + (sortOrder === 'asc' ? ' rfilter__sort-icon--flip' : '')}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 8l4-4 4 4M7 4v16M21 16l-4 4-4-4M17 20V4"/>
            </svg>
          </span>
          {sortOrder === 'desc' ? 'Newest first' : 'Oldest first'}
        </button>
      </div>

      {/* Category stickers */}
      <div className="rfilter__tags">
        <button
          className={"rfilter__tag-all" + (activeTag === null ? ' is-active' : '')}
          onClick={() => setActiveTag(null)}
        >
          All
          <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17 5.8 21.3l2.4-7.4L2 9.4h7.6z"/>
          </svg>
        </button>
        {allTags.map(tag => {
          const s = TAG_MAP[tag] || TAG_DEFAULT;
          const active = activeTag === tag;
          return (
            <button
              key={tag}
              className={"rfilter__tag" + (active ? ' is-active' : '')}
              style={{ background: s.bg, transform: active ? 'rotate(0deg) scale(1.04)' : `rotate(${s.rot})` }}
              onClick={() => setActiveTag(active ? null : tag)}
            >
              {tag}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ─── List with all filters + infinite scroll ─── */
const BATCH = 5;

function ReflectionsList() {
  const [search, setSearch]       = useRS('');
  const [activeTag, setActiveTag] = useRS(null);
  const [sortOrder, setSortOrder] = useRS('desc');
  const [visible, setVisible]       = useRS(BATCH);
  const [loading, setLoading]       = useRS(false);
  const sentRef = useRR(null);

  const allTags = [...new Set(REFLECTIONS.map(r => r.tag))];

  const textOf = p =>
    p.text || (p.segments || []).map(s => typeof s === 'string' ? s : s.text).join('');

  const filtered = REFLECTIONS
    .filter(r => !activeTag || r.tag === activeTag)
    .filter(r => {
      if (!search.trim()) return true;
      const q = search.toLowerCase();
      return r.title.toLowerCase().includes(q) ||
        r.paragraphs.some(p => textOf(p).toLowerCase().includes(q));
    })
    .sort((a, b) => sortOrder === 'desc'
      ? b.date.localeCompare(a.date)
      : a.date.localeCompare(b.date));

  useRE(() => { setVisible(BATCH); }, [search, activeTag, sortOrder]);

  useRE(() => {
    if (visible >= filtered.length || !sentRef.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !loading) {
        setLoading(true);
        setTimeout(() => {
          setVisible(v => Math.min(v + BATCH, filtered.length));
          setLoading(false);
        }, 380);
      }
    }, { threshold: 0.1 });
    io.observe(sentRef.current);
    return () => io.disconnect();
  }, [visible, filtered.length, loading]);

  function pickTag(tag) {
    setSearch(''); setActiveTag(tag);
  }

  const shown = filtered.slice(0, visible);

  return (
    <>
      <FilterBar
        allTags={allTags}
        activeTag={activeTag} setActiveTag={setActiveTag}
        search={search}       setSearch={setSearch}
        sortOrder={sortOrder} setSortOrder={setSortOrder}
      />
      <div className="rlist">
        {shown.map((r, i) => (
          <ReflectionCard key={r.id} item={r} batchIndex={i % BATCH} />
        ))}
        {visible < filtered.length && (
          <div ref={sentRef} className="rlist__sentinel">
            {loading && <div className="rlist__loader"><span /><span /><span /></div>}
          </div>
        )}
      </div>
    </>
  );
}
